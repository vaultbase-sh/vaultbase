# Landing SPA — single-page fallback to index.html.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve hashed assets aggressively cached, immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Favicon + static root files — short cache.
  location ~* \.(svg|png|ico|webmanifest)$ {
    expires 1d;
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback — every unmatched path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  gzip_min_length 1024;

  # Security headers — vaultbase landing is purely static so these are safe.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=()" always;
}
