# Docs site — multi-page static. Astro emits per-route HTML; no SPA fallback.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets — long cache, immutable.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Favicon + static root files — short cache.
  location ~* \.(svg|png|ico|webmanifest|woff2?|ttf|eot)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }

  # Astro generates `<route>/index.html`. Try clean URL first, fall back
  # to file-with-extension, then 404.
  location / {
    try_files $uri $uri/ $uri.html =404;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  error_page 404 /404.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain text/html;
  gzip_min_length 1024;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=()" always;
}
