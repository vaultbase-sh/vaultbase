# Vaultbase reverse-proxy template for nginx.
#
# Drop this in /etc/nginx/sites-available/vaultbase, symlink to sites-enabled,
# replace `api.example.com` + `ssl_certificate*` paths with your own, then:
#
#   sudo nginx -t && sudo systemctl reload nginx

upstream vaultbase {
    server 127.0.0.1:8091;
    keepalive 64;
    keepalive_timeout 60s;
}

# Defense-in-depth rate limit (the app also enforces its own per-rule
# limits — this catches blatant abuse before it reaches Bun). Must live in
# the `http {}` context, not inside a `server` block. The sites-enabled
# include sits inside `http`, so top-level placement here is correct.
limit_req_zone $binary_remote_addr zone=vb:10m rate=200r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    # Redirect all HTTP to HTTPS (or use certbot --nginx to set this up).
    return 301 https://$host$request_uri;
}

server {
    # nginx 1.25+ deprecates `listen … http2`; use the standalone directive.
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Compression — handled here, not in Vaultbase. In-process gzip was
    # removed because it blocked the event loop.
    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # Apply the rate-limit zone defined above.
    limit_req zone=vb burst=400 nodelay;

    # WebSocket realtime
    location /realtime {
        proxy_pass http://vaultbase;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "Upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # SSE fallback — disable buffering so events stream to clients live.
    location /api/realtime {
        proxy_pass http://vaultbase;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else.
    location / {
        proxy_pass http://vaultbase;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous client body limit — file uploads ride here.
        client_max_body_size 100m;
    }
}
